<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructura semántica</title>
</head>
<body>
    <!-- 1. El encabezado de la web -->
    <header>
        <h1>Mi Sitio Web</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>
    
    <!-- 2. El contenido principal y único -->
    <main>
        
        <!-- Una sección temática dentro de la página -->
        <section>
            <h2>Últimas Noticias</h2>
            
            <!-- Un contenido que tiene sentido por sí mismo -->
            <article>
                <h3>¡HTML5 cambió la web!</h3>
                <p>Las etiquetas semánticas hacen el código más limpio...</p>
            </article>

            <article>
                <h3>Consejos de CSS</h3>
                <p>Aprende a darle estilo a tu estructura...</p>
            </article>
        </section>

        <!-- Contenido secundario (barra lateral) -->
        <aside>
            <h3>Autor</h3>
            <p>Hola, soy desarrollador web.</p>
        </aside>

    </main>
    
</body>
</html>
